name: Generate Full Repository Summary

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate-summary:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Combine ALL files into one
        run: |
          # إنشاء ملف التلخيص
          echo "Full Repository Summary - $(date)" > full_repo_summary.txt
          echo "======================================" >> full_repo_summary.txt
          
          # البحث عن كافة الملفات واستثاء ملف التلخيص نفسه فقط
          find . -type f ! -name "full_repo_summary.txt" | while read file; do
            echo -e "\n\n--- File: $file ---\n" >> full_repo_summary.txt
            cat "$file" >> full_repo_summary.txt
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: full-repo-summary
          path: full_repo_summary.txt
